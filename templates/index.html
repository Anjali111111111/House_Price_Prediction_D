<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:rgba(255,255,255,0.96);
            border-radius:20px;
            padding:35px;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:10px;
            font-size:2rem;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:600;
            color:#444;
            margin-bottom:6px;
        }

        input{
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#667eea;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#667eea;
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#5a67d8;
        }

        .prediction{
            margin-top:25px;
            padding:25px;
            background:#f8fafc;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .prediction-title{
            color:#666;
            font-size:16px;
        }

        .prediction-value{
            font-size:32px;
            font-weight:bold;
            color:#667eea;
            margin-top:10px;
        }

        canvas{
            margin-top:25px;
        }

        @media(max-width:768px){
            .form-grid{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🏠 House Price Prediction</h2>

    <p class="subtitle">
        Estimate residential property prices using Machine Learning
    </p>

    <form action="/predict" method="post">

        <div class="form-grid">

            <div class="form-group">
                <label>Overall Quality (1-10)</label>
                <input type="number" name="OverallQual" placeholder="e.g. 7" required>
            </div>

            <div class="form-group">
                <label>Above Ground Living Area (sqft)</label>
                <input type="number" name="GrLivArea" placeholder="e.g. 1800" required>
            </div>

            <div class="form-group">
                <label>Total Basement Area (sqft)</label>
                <input type="number" name="TotalBsmtSF" placeholder="e.g. 900" required>
            </div>

            <div class="form-group">
                <label>Second Floor Area (sqft)</label>
                <input type="number" name="2ndFlrSF" placeholder="e.g. 500">
            </div>

            <div class="form-group">
                <label>First Floor Area (sqft)</label>
                <input type="number" name="1stFlrSF" placeholder="e.g. 1300">
            </div>

            <div class="form-group">
                <label>Garage Area (sqft)</label>
                <input type="number" name="GarageArea" placeholder="e.g. 450">
            </div>

            <div class="form-group">
                <label>Year Built</label>
                <input type="number" name="YearBuilt" placeholder="e.g. 2005">
            </div>

            <div class="form-group">
                <label>Number of Full Bathrooms</label>
                <input type="number" name="FullBath" placeholder="e.g. 2">
            </div>

            <div class="form-group">
                <label>Lot Area (sqft)</label>
                <input type="number" name="LotArea" placeholder="e.g. 8000">
            </div>

            <div class="form-group">
                <label>Garage Capacity (cars)</label>
                <input type="number" name="GarageCars" placeholder="e.g. 2">
            </div>

        </div>

        <button type="submit">🔮 Predict House Price</button>

    </form>

    {% if prediction_text %}

    <div class="prediction">
        <div class="prediction-title">
            Estimated House Price
        </div>

        <div class="prediction-value">
            {{ prediction_text }}
        </div>
    </div>

    <canvas id="priceChart"></canvas>

    <script>
        const ctx = document.getElementById('priceChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Predicted Price', 'Average Price'],
                datasets: [{
                    label: 'Price ($)',
                    data: [{{ pred|default(0) }}, 180000],
                    backgroundColor: ['#667eea', '#f59e0b']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    </script>

    {% endif %}

</div>

</body>
</html>
